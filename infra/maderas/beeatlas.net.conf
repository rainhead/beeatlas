# beeatlas.net served from maderas (stelis ADR 0007, st-bgy).
# Install: docs/runbooks/serve-from-maderas.md. This is the port-80 vhost;
# `certbot --apache` clones it into beeatlas.net-le-ssl.conf (TLS + the
# HTTPS redirect) once DNS points here — same setup as api.beeatlas.net.
<VirtualHost *:80>
    ServerName beeatlas.net
    ServerAlias www.beeatlas.net

    # The root data/nightly.sh's publish step merges into (SITE_ROOT): the
    # rendered _site tree at /, hashed data artifacts + manifest under /data.
    DocumentRoot /var/www/beeatlas.net
    <Directory /var/www/beeatlas.net>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Cache policy ports the S3/CloudFront semantics (deploy.yml + nightly.sh):
    # default max-age=0 — HTML and anything unhashed revalidates every request.
    Header set Cache-Control "max-age=0"
    # Content-hashed files are immutable: 11ty/vite bundles under /assets/, and
    # nightly's data artifacts (<basename>-<hash12>.<ext>) under /data/.
    <LocationMatch "^/(assets/|data/[^/]+-[0-9a-f]{12}\.)">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>
    # The manifest resolves the current hashed names and must never be cached
    # stale (the SW's data-manifest NetworkFirst route depends on this).
    <Location "/data/manifest.json">
        Header set Cache-Control "no-cache"
    </Location>

    # CloudFront auto-compressed application/json responses; here mod_deflate
    # does. (Parquet/db artifacts stay uncompressed — internally compressed.)
    AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml application/xml application/atom+xml
    AddType application/json .geojson

    ErrorLog ${APACHE_LOG_DIR}/beeatlas.net-error.log
    CustomLog ${APACHE_LOG_DIR}/beeatlas.net-access.log combined
</VirtualHost>
