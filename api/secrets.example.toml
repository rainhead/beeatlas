# BeeAtlas auth/write API — secrets TEMPLATE (committed).
#
# Copy this file to `api/secrets.toml` (gitignored) and fill in the real values.
# NEVER put real secrets in this example file, and never commit `api/secrets.toml`.
# The Flask service loads `api/secrets.toml` at runtime (mirrors data/.dlt/secrets.toml).

[inaturalist_oauth]
# Public OAuth client identifier — appears in the /oauth/authorize redirect (not a secret,
# but keep the real value in api/secrets.toml rather than here).
client_id = "your-inat-oauth-client-id"
# SECRET — the iNaturalist app's client secret. Never commit.
client_secret = "your-inat-oauth-client-secret"
# Exact-match redirect URI registered on the iNat app (see CONTEXT D-12/D-13).
redirect_uri = "https://api.beeatlas.net/auth/callback"

[session]
# SECRET — signing key for the itsdangerous-signed session cookie.
# Generate with:  python -c "import secrets; print(secrets.token_urlsafe(64))"
signing_key = "generate-a-64-byte-urlsafe-random-key"
