# BeeAtlas auth/write API — secrets TEMPLATE (committed).
#
# Copy this file to `api/secrets.toml` (gitignored) and fill in the real values.
# NEVER put real secrets in this example file, and never commit `api/secrets.toml`.
# The Flask service loads `api/secrets.toml` at runtime (mirrors data/.dlt/secrets.toml).

[inaturalist_oauth]
# Public OAuth client identifier — appears in the /oauth/authorize redirect (not a secret,
# but keep the real value in api/secrets.toml rather than here).
client_id = "your-inat-oauth-client-id"
# SECRET — the iNaturalist app's client secret. Never commit.
client_secret = "your-inat-oauth-client-secret"
# Exact-match redirect URI registered on the iNat app (see CONTEXT D-12/D-13).
# LOCAL DEV: a loopback URI (e.g. "http://localhost:8081/auth/callback",
# registered on a SEPARATE dev iNat app) switches the service into DEV_MODE —
# loopback origins pass the CSRF gate and cookies drop the Secure flag.
# See api/README.md. Any other deviation from the pin fails at import.
redirect_uri = "https://api.beeatlas.net/auth/callback"

[session]
# SECRET — signing key for the itsdangerous-signed session cookie.
# Generate with:  python -c "import secrets; print(secrets.token_urlsafe(64))"
signing_key = "generate-a-64-byte-urlsafe-random-key"

[launch]
# NOT a secret — the WRITE-04 launch gate. Writes are refused (503) until
# this is true. Set true only after the operator confirms the 177-07 restore
# drill (docs/runbooks/notes-store-dr.md) on this deployment. Kept alongside
# the OAuth secrets purely for operator convenience; the WRITES_ENABLED env
# var, if set, always overrides this value.
writes_enabled = false
# NOT a secret — the st-nee synchronous-publish gate (stelis ADR 0007). When
# true, a committed note write shells out to data/publish-notes.sh (scoped
# stelis build + site render + merge-swap into the served root) before
# responding. Leave false anywhere the maderas htdocs+var layout doesn't
# exist; writes then respond "publish": "pending" and the nightly bakes them.
# A NOTE_PUBLISH_ENABLED env var, if set, always overrides this value.
note_publish_enabled = false

[serve]
# NOT a secret — the loopback port api/serve.py's Waitress process binds.
# Apache's mod_proxy_http reverse-proxies https://api.beeatlas.net to
# 127.0.0.1:<port> (D-17). A SERVE_PORT env var, if set, overrides this.
port = 8080
