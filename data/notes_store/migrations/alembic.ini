# Alembic configuration for BeeAtlas authoritative notes store.
#
# script_location = . means Alembic looks in the same directory as this ini
# file for env.py, script.py.mako, and versions/.
#
# IMPORTANT: sqlalchemy.url is intentionally absent. The database URL is
# derived at runtime from the NOTES_DB_PATH environment variable in env.py
# (default /opt/beeatlas-store/notes.db). Never hard-code it here.
#
# Run migrations:
#   cd data
#   NOTES_DB_PATH=/opt/beeatlas-store/notes.db \
#     uv run alembic -c notes_store/migrations/alembic.ini upgrade head

[alembic]
# Location of env.py, script.py.mako, and versions/ — relative to this file.
script_location = .

# Prepend the data/ directory to sys.path so that "from notes_store.models import Base"
# resolves regardless of the caller's cwd. alembic.ini lives at
# data/notes_store/migrations/alembic.ini, so ../../.. goes up to data/.
prepend_sys_path = ../../..

# Avoid legacy comma/space splitting deprecation warning in Alembic >=1.13
path_separator = os

# Migration file naming: NNNN_slug.py
file_template = %%(rev)s_%%(slug)s

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
