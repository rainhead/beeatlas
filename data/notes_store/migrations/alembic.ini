# Alembic configuration for BeeAtlas authoritative notes store.
#
# script_location uses %(here)s (the directory of this ini file) so env.py,
# script.py.mako, and versions/ resolve independently of the caller's cwd.
#
# IMPORTANT: sqlalchemy.url is intentionally absent. The database URL is
# derived at runtime from the NOTES_DB_PATH environment variable in env.py.
# Never hard-code it here.
#
# Run migrations (works from any cwd — paths below are anchored to this file):
#   NOTES_DB_PATH=$HOME/beeatlas-store/notes.db \
#     uv run alembic -c data/notes_store/migrations/alembic.ini upgrade head

[alembic]
# Location of env.py, script.py.mako, and versions/. %(here)s = the directory
# containing this ini file, so resolution is cwd-independent (a bare "."
# resolves against cwd and breaks `alembic -c <path>` invocations).
script_location = %(here)s

# Prepend the data/ directory to sys.path so "from notes_store.models import Base"
# resolves regardless of cwd. This ini lives at data/notes_store/migrations/,
# so %(here)s/../.. is data/. (A prior value of ../../.. pointed one level too
# high — the repo root — and broke the import; fixed after the Phase 177 drill.)
prepend_sys_path = %(here)s/../..

# Avoid legacy comma/space splitting deprecation warning in Alembic >=1.13
path_separator = os

# Migration file naming: NNNN_slug.py
file_template = %%(rev)s_%%(slug)s

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
