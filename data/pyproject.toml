[project]
name = "beeatlas-data"
version = "0.1.0"
description = "dlt pipelines for Washington Bee Atlas data ingestion"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "dlt[duckdb]>=1.23.0",
    "duckdb",
    "pyarrow>=12",
    "requests",
    "beautifulsoup4",
    "boto3>=1.42.78",
    "seamless-3dep>=0.4.1",
    "rasterio>=1.5.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
