# data/artifacts.toml — single source of truth for every published artifact.
#
# Purpose: Declarative contract for all 16 published manifest artifacts
# (14 hashed + 2 metadata) in manifest order (matching nightly.sh heredoc).
#
# Python (artifacts.py) emits plans (publish-plan, baseline-pull-plan,
# build-time-fetch, manifest) as text only. All S3 I/O stays in nightly.sh
# and .github/workflows/deploy.yml per CLAUDE.md: "Python knows nothing about S3".
#
# Schema fields:
#   provenance              — "derived" | "authoritative"
#   kind                    — "hashed" | "metadata"
#   source_file             — local filename in EXPORT_DIR (hashed only)
#   hash_basename           — basename passed to _upload_hashed* (hashed only)
#   baseline_diff           — bool (default false); pull for integration diff baseline
#   build_time_fetch        — bool (default false); deploy.yml fetches at build time
#   build_time_fetch_optional — bool (default false); only species_hosts (pre-first-nightly guard)
#   gzip                    — bool (default false); only occurrences_db
#   content_type            — string (omit unless set; only geojson artifacts)
#   metadata_type           — "json" | "string" (metadata kind only)
#
# Documented exclusion: feeds/, species-maps/, place-maps/ are recursive S3 publishes
# with no per-file hash or manifest key; they stay hardcoded in nightly.sh.

[artifacts.occurrences]
provenance = "derived"
kind = "hashed"
source_file = "occurrences.parquet"
hash_basename = "occurrences"
baseline_diff = true

[artifacts.occurrences_db]
provenance = "derived"
kind = "hashed"
source_file = "occurrences.db"
hash_basename = "occurrences"
gzip = true

[artifacts.species]
provenance = "derived"
kind = "hashed"
source_file = "species.json"
hash_basename = "species"
baseline_diff = true
build_time_fetch = true

