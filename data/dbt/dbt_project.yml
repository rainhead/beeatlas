name: beeatlas
version: '0.1.0'
config-version: 2
profile: beeatlas

model-paths: ["models"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages", "logs"]

# Ensure the PAD-US wilderness source table exists before any model builds
# (beeatlas-2vj). It is populated out-of-band by
# geographies_pipeline.load_padus_wilderness (a manual, rarely-run step), so a
# host that hasn't loaded it yet would otherwise fail `dbt build` on the missing
# source and take down the whole nightly. Creating it empty here is a no-op once
# real data is loaded (CREATE TABLE IF NOT EXISTS) and yields an empty
# wilderness.geojson until then — the overlay degrades gracefully.
on-run-start:
  - "CREATE SCHEMA IF NOT EXISTS geographies"
  - >
    CREATE TABLE IF NOT EXISTS geographies.padus_wilderness (
      unit_name VARCHAR, des_tp VARCHAR, state_nm VARCHAR, geom GEOMETRY
    )

models:
  beeatlas:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
      int_combined:
        +materialized: table          # override: prevent re-evaluating full UNION ALL on every spatial join
    marts:
      +materialized: table            # default; occurrences.sql overrides to 'external'

seeds:
  beeatlas:
    occurrence_synonyms:
      +column_types:
        synonym: varchar
        accepted_name: varchar
        source: varchar
    auto_synonyms:
      +column_types:
        synonym: varchar
        accepted_name: varchar
        source: varchar
    gbif_checklist_synonyms:
      +column_types:
        synonym: varchar
        accepted_name: varchar
        source: varchar
        gbif_usage_key: varchar
        gbif_match_type: varchar
        gbif_confidence: varchar
    dedup_decisions:
      +column_types:
        pair_key: varchar
        dedup_status: varchar
        note: varchar
    curated_taxon_ids:
      +column_types:
        canonical_name: varchar
        taxon_id: integer
        note: varchar
    bee_traits_beegap:
      +column_types:
        canonical_name: varchar
        native: varchar
        nesting: varchar
        sociality: varchar
        foraging: varchar
    bee_specialist_hosts:
      +column_types:
        canonical_name: varchar
        host_plant_family: varchar
        host_plant_detail: varchar
        host_states: varchar
        fowler_status: varchar
    bee_genus_traits:
      +column_types:
        genus: varchar
        sociality: varchar
        nesting: varchar
        note: varchar
    bee_parasite_hosts:
      +column_types:
        parasite: varchar
        host_genus: varchar
        host_species: varchar
        host_taxon: varchar
