version: 2
sources:
  - name: ecdysis_data
    schema: ecdysis_data
    tables:
      - name: occurrences
      - name: identifications
      - name: occurrence_links

  - name: inaturalist_data
    schema: inaturalist_data
    tables:
      - name: observations
      - name: observations__ofvs
      - name: observations__observation_projects  # iNat project membership; loaded by projects_pipeline.py
      - name: canonical_to_taxon_id   # written by resolve_taxon_ids.py (ingestion)
      - name: taxon_lineage_extended  # written by taxa_pipeline.load_taxon_lineage_extended (Phase 110 offline taxonomy)

  - name: inaturalist_waba_data
    schema: inaturalist_waba_data
    tables:
      - name: observations
      - name: observations__ofvs

  - name: checklist_data
    schema: checklist_data
    tables:
      - name: species
      - name: species_counties
      - name: checklist_records
      - name: checklist_records_full   # Phase 135: full-fidelity checklist with coord/date/collector

  - name: geographies
    schema: geographies
    tables:
      - name: us_counties
      - name: us_states
      - name: ecoregions
      - name: places

  - name: inat_obs_data
    schema: inat_obs_data
    tables:
      - name: observations
