version: 2

models:
  - name: int_id_modified
    columns:
      - name: coreid
        description: Ecdysis occurrence coreid — unique per row in this aggregate
        data_tests:
          - not_null
          - unique    # VERIFIED: 46,090 rows, 46,090 distinct coreids

  - name: int_combined
    columns:
      - name: is_provisional
        data_tests:
          - not_null  # should always be TRUE or FALSE, never NULL

  - name: int_ecdysis_base
    columns:
      - name: ecdysis_id
        data_tests:
          - relationships:
              to: ref('stg_ecdysis__occurrences')
              field: catalog_number
              # NOTE: ecdysis_id is INTEGER; catalog_number is VARCHAR — type mismatch.
              # Expected to ERROR with BinderError (INTEGER vs VARCHAR comparison).
              # Documented as awkward-fit: relationships test requires explicit CAST
              # for cross-type keys. The error IS the TEST-01 finding.
