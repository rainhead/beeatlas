version: 2

models:
  - name: occurrences
    config:
      contract:
        enforced: true
    columns:
      - name: ecdysis_id
        data_type: integer
      - name: catalog_number
        data_type: varchar
      - name: lon
        data_type: double
      - name: lat
        data_type: double
      - name: date
        data_type: varchar
      - name: year
        data_type: bigint
      - name: month
        data_type: bigint
      - name: scientificName
        data_type: varchar
      - name: recordedBy
        data_type: varchar
      - name: fieldNumber
        data_type: varchar
      - name: genus
        data_type: varchar
      - name: family
        data_type: varchar
      - name: floralHost
        data_type: varchar
      - name: host_observation_id
        data_type: bigint
      - name: inat_host
        data_type: varchar
      - name: inat_quality_grade
        data_type: varchar
      - name: modified
        data_type: varchar
      - name: specimen_observation_id
        data_type: bigint
      - name: elevation_m
        data_type: integer
      - name: observation_id
        data_type: bigint
      - name: host_inat_login
        data_type: varchar
      - name: specimen_count
        data_type: integer
      - name: sample_id
        data_type: integer
      - name: sample_host
        data_type: varchar
      - name: specimen_inat_taxon_name
        data_type: varchar
      - name: specimen_inat_quality_grade
        data_type: varchar
      - name: is_provisional
        data_type: boolean
      - name: canonical_name
        data_type: varchar
      - name: county
        data_type: varchar
      - name: ecoregion_l3
        data_type: varchar
      - name: place_slug
        data_type: varchar
      - name: source
        data_type: varchar
      - name: image_url
        data_type: varchar
      - name: obs_url
        data_type: varchar
      - name: user_login
        data_type: varchar
      - name: license
        data_type: varchar
      - name: taxon_id
        data_type: integer
        data_tests:
          # Phase 128 (TID-02 re-scope, D-04/D-05): assert non-null taxon_id for EVERY named row
          # (single-token genus OR two-token species), not just species-level. Under the Animalia
          # rule every genus name resolves, so the only documented exceptions are the 3 unresolvable
          # ecdysis species (anthidiellum robertsoni, lasioglossum aspilurus, osmia phaceliae — 0
          # iNat API results). Truly-unidentified rows (NULL/empty canonical_name) are excluded.
          # Kept severity: warn per D-04 (matches Phase 126 relaxation + nightly-gate culture).
          - not_null:
              config:
                severity: warn
                where: "canonical_name is not null and canonical_name <> '' and canonical_name not in ('anthidiellum robertsoni', 'lasioglossum aspilurus', 'osmia phaceliae')"

  - name: species
    config:
      contract:
        enforced: true
    columns:
      - name: scientificName
        data_type: varchar
      - name: canonical_name
        data_type: varchar
      - name: family
        data_type: varchar
      - name: subfamily
        data_type: varchar
      - name: tribe
        data_type: varchar
      - name: genus
        data_type: varchar
      - name: subgenus
        data_type: varchar
      - name: specific_epithet
        data_type: varchar
      - name: on_checklist
        data_type: boolean
      - name: status
        data_type: varchar
      - name: occurrence_count
        data_type: bigint
      - name: specimen_count
        data_type: bigint
      - name: provisional_count
        data_type: bigint
      - name: first_occurrence_date
        data_type: date
      - name: last_occurrence_date
        data_type: date
      - name: month_histogram
        data_type: integer[12]
      - name: county_count
        data_type: bigint
      - name: ecoregion_count
        data_type: bigint
      - name: checklist_count
        data_type: bigint
      - name: inat_obs_count
        data_type: bigint
      - name: taxon_id
        data_type: integer
        constraints:
          - type: not_null

  - name: checklist
    config:
      contract:
        enforced: true
    columns:
      - name: canonical_name
        data_type: varchar
        data_tests:
          - not_null
      - name: scientificName
        data_type: varchar
      - name: genus
        data_type: varchar
      - name: specific_epithet
        data_type: varchar
        data_tests:
          - not_null
      - name: family
        data_type: varchar
      - name: lat
        data_type: double
      - name: lon
        data_type: double
      - name: year
        data_type: bigint
      - name: month
        data_type: bigint
      - name: county
        data_type: varchar
      - name: ecoregion_l3
        data_type: varchar
      - name: source
        data_type: varchar
