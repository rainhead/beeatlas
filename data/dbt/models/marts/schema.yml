version: 2

models:
  - name: occurrences
    config:
      contract:
        enforced: true
    columns:
      - name: ecdysis_id
        data_type: integer
      - name: catalog_number
        data_type: varchar
      - name: lon
        data_type: double
      - name: lat
        data_type: double
      - name: date
        data_type: varchar
      - name: year
        data_type: bigint
      - name: month
        data_type: bigint
      - name: recordedBy
        data_type: varchar
      - name: fieldNumber
        data_type: varchar
      - name: floralHost
        data_type: varchar
      - name: host_observation_id
        data_type: bigint
      - name: inat_host
        data_type: varchar
      - name: inat_quality_grade
        data_type: varchar
      - name: modified
        data_type: varchar
      - name: specimen_observation_id
        data_type: bigint
      - name: elevation_m
        data_type: integer
      - name: observation_id
        data_type: bigint
      - name: host_inat_login
        data_type: varchar
      - name: specimen_count
        data_type: integer
      - name: sample_id
        data_type: integer
      - name: sample_host
        data_type: varchar
      - name: specimen_inat_quality_grade
        data_type: varchar
      - name: is_provisional
        data_type: boolean
      - name: canonical_name
        data_type: varchar
      - name: county
        data_type: varchar
      - name: ecoregion_l3
        data_type: varchar
      - name: tier
        data_type: varchar
      - name: record_type
        data_type: varchar
      - name: image_url
        data_type: varchar
      - name: obs_url
        data_type: varchar
      - name: user_login
        data_type: varchar
      - name: license
        data_type: varchar
      - name: checklist_id
        data_type: integer
      - name: verbatim_name
        data_type: varchar
      - name: locality
        data_type: varchar
      - name: collapsed_count
        data_type: integer
      - name: taxon_id
        data_type: integer
        data_tests:
          # Phase 128 (TID-02 re-scope, D-04/D-05): assert non-null taxon_id for EVERY named row
          # (single-token genus OR two-token species), not just species-level. Under the Animalia
          # rule every genus name resolves, so the only documented exceptions are the 3 unresolvable
          # ecdysis species (anthidiellum robertsoni, lasioglossum aspilurus, osmia phaceliae — 0
          # iNat API results). Truly-unidentified rows (NULL/empty canonical_name) are excluded.
          # Kept severity: warn per D-04 (matches Phase 126 relaxation + nightly-gate culture).
          - not_null:
              config:
                severity: warn
                where: "canonical_name is not null and canonical_name <> '' and canonical_name not in ('anthidiellum robertsoni', 'lasioglossum aspilurus', 'osmia phaceliae')"
      - name: collector_inat_login
        data_type: varchar
        data_tests:
          # D-05 (Phase 167): WABA-named arms (waba_sample, waba_specimen) are small and
          # provably 100% resolved (0 NULLs as of 2026-06-24). A NULL here is a join regression.
          # Hard-error to block nightly.
          - not_null:
              name: not_null_occurrences_collector_inat_login_waba
              config:
                severity: error
                where: "record_type in ('provisional_sample', 'waba_specimen')"
          # D-06 (Phase 167): ecdysis has ~2,767 unresolvable NULLs (specimens with no matched
          # iNat observation). Warn-only; surfaces drift count each build without blocking nightly.
          # Baseline 2026-06-24: 2,767 of 48,801 ecdysis rows. Warn count = current drift.
          - not_null:
              name: not_null_occurrences_collector_inat_login_ecdysis_drift
              config:
                severity: warn
                where: "record_type = 'specimen'"
      # D-05/D-06 (Phase 168): the "Identified" timeline anchor. VARCHAR keeps year-only
      # partials (D-06) — a DATE column would NULL ~26k year-only ecdysis IDs. Derived only
      # for ARM 1 (parsed date_identified); NULL for the other four arms (D-08/D-09).
      # Parse-completeness is enforced by the warn-severity singular test
      # assert_id_date_parse_complete (D-13), not an inline data_test here.
      - name: id_date
        data_type: varchar

  - name: occurrence_places
    # Phase 160 (D-01): many-to-many occurrence ↔ place bridge. One row per
    # (occ_id, place_slug) membership; occ_id mirrors src/occurrence.ts occIdFromRow.
    config:
      contract:
        enforced: true
    columns:
      - name: occ_id
        data_type: varchar
        data_tests:
          - not_null
      - name: place_slug
        data_type: varchar
        data_tests:
          - not_null

  - name: species
    config:
      contract:
        enforced: true
    columns:
      - name: scientificName
        data_type: varchar
      - name: canonical_name
        data_type: varchar
      - name: family
        data_type: varchar
      - name: subfamily
        data_type: varchar
      - name: tribe
        data_type: varchar
      - name: genus
        data_type: varchar
      - name: subgenus
        data_type: varchar
      - name: specific_epithet
        data_type: varchar
      - name: on_checklist
        data_type: boolean
      - name: status
        data_type: varchar
      - name: occurrence_count
        data_type: bigint
      - name: specimen_count
        data_type: bigint
      - name: provisional_count
        data_type: bigint
      - name: first_occurrence_date
        data_type: date
      - name: last_occurrence_date
        data_type: date
      - name: month_histogram
        data_type: integer[12]
      - name: county_count
        data_type: bigint
      - name: ecoregion_count
        data_type: bigint
      - name: checklist_count
        data_type: bigint
      - name: inat_obs_count
        data_type: bigint
      - name: taxon_id
        data_type: integer
        constraints:
          - type: not_null

  - name: checklist
    config:
      contract:
        enforced: true
    columns:
      - name: canonical_name
        data_type: varchar
        data_tests:
          - not_null
      - name: scientificName
        data_type: varchar
      - name: genus
        data_type: varchar
      - name: specific_epithet
        data_type: varchar
        data_tests:
          - not_null
      - name: family
        data_type: varchar
      - name: lat
        data_type: double
      - name: lon
        data_type: double
      - name: year
        data_type: bigint
      - name: month
        data_type: bigint
      - name: county
        data_type: varchar
      - name: ecoregion_l3
        data_type: varchar
      - name: source
        data_type: varchar

  - name: higher_taxa
    config:
      contract:
        enforced: true
    columns:
      - name: taxon_id
        data_type: integer
        constraints:
          - type: not_null
        data_tests:
          - not_null
          - unique
      - name: rank
        data_type: varchar
        constraints:
          - type: not_null
      - name: name
        data_type: varchar
        constraints:
          - type: not_null
      - name: family
        data_type: varchar
      - name: subfamily
        data_type: varchar
      - name: tribe
        data_type: varchar
      - name: genus
        data_type: varchar
      - name: specimen_count
        data_type: bigint
      - name: inat_obs_count
        data_type: bigint
      - name: occurrence_count
        data_type: bigint
      - name: species_count
        data_type: bigint
      - name: member_taxon_ids
        data_type: varchar
