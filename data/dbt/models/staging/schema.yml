version: 2

models:
  - name: stg_ecdysis__occurrences
    columns:
      - name: catalog_number
        description: Ecdysis catalog number — unique primary key in this dataset
        data_tests:
          - not_null
          - unique    # VERIFIED unique: 46,090 rows, 46,090 distinct catalog_numbers

  - name: stg_waba__observations
    columns:
      - name: id
        data_tests:
          - not_null
          - unique    # VERIFIED unique: 1,408 rows, 1,408 distinct ids

  - name: stg_inat__observations
    columns:
      - name: id
        description: >
          iNaturalist observation ID. The dlt soft-delete tombstone row (id=NULL) is
          filtered upstream in stg_inat__observations.sql; this view contains 10,845
          rows post-filter. Both not_null and unique now pass cleanly.
        data_tests:
          - not_null    # VERIFIED: 10,845 rows post-filter (tombstone excluded in staging view)
          - unique      # VERIFIED unique: 10,845 distinct / 10,845 rows
