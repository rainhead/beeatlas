version: 2

models:
  - name: stg_ecdysis__occurrences
    columns:
      - name: catalog_number
        description: Ecdysis catalog number — unique primary key in this dataset
        data_tests:
          - not_null
          - unique    # VERIFIED unique: 46,090 rows, 46,090 distinct catalog_numbers

  - name: stg_waba__observations
    columns:
      - name: id
        data_tests:
          - not_null
          - unique    # VERIFIED unique: 1,408 rows, 1,408 distinct ids

  - name: stg_inat__observations
    columns:
      - name: id
        description: >
          iNaturalist observation ID. The dlt soft-delete tombstone row (id=NULL) is
          filtered upstream in stg_inat__observations.sql; this view contains 10,845
          rows post-filter. Both not_null and unique now pass cleanly.
        data_tests:
          - not_null    # VERIFIED: 10,845 rows post-filter (tombstone excluded in staging view)
          - unique      # VERIFIED unique: 10,845 distinct / 10,845 rows

  - name: stg_inat__canonical_to_taxon_id
    columns:
      - name: canonical_name
        data_tests:
          - not_null
          - unique    # VERIFIED: 735 rows, 735 distinct canonical_names

  - name: stg_inat__taxon_lineage_extended
    columns:
      - name: taxon_id
        data_tests:
          - not_null
          - unique    # VERIFIED: 2196 rows, 2196 distinct taxon_ids

  - name: stg_inat__genus_taxon_ids
    columns:
      - name: genus_name
        description: >
          Lowercase active Animalia genus name -> genus self-row taxon_id (Phase 128 D-02).
          The unique test is the fail-loud safety net (D-02b): 0 of our 149 occurrence genera
          collide within Animalia today, so the int_combined LEFT JOIN cannot fan out. A future
          cross-phylum animal-genus homonym would fail this test at build time instead of
          silently duplicating occurrence rows.
        data_tests:
          - not_null
          - unique

  - name: stg_checklist__species
    columns:
      - name: canonical_name
        data_tests:
          - not_null
