version: 2

seeds:
  - name: occurrence_synonyms
    columns:
      - name: synonym
        data_tests:
          - not_null
          - unique
      - name: accepted_name
        data_tests:
          - not_null
      - name: source
        description: "Citation for the synonymy decision (e.g., 'Portman et al. 2024')"
  - name: auto_synonyms
    columns:
      - name: synonym
        data_tests:
          - not_null
          - unique
      - name: accepted_name
        data_tests:
          - not_null
      - name: source
        description: "Auto-generated: 'inat-inactive-remap:{inactive_taxon_id}'"
  - name: gbif_checklist_synonyms
    description: "GBIF backbone synonym mappings for unresolved checklist names (Phase 135). Written by resolve_checklist_names.py --refresh-checklist; read by int_synonyms third arm. Lowest precedence: anti-joined against occurrence_synonyms AND auto_synonyms."
    columns:
      - name: synonym
        description: "Normalized canonical form of the unresolved checklist name (checklist → accepted iNat name)"
        data_tests:
          - not_null
          - unique
      - name: accepted_name
        description: "Accepted canonical name from GBIF backbone (lowercased)"
        data_tests:
          - not_null
      - name: source
        description: "Auto-generated GBIF backbone match: 'gbif-backbone:{usage_key}'"
  - name: curated_taxon_ids
    description: "Curator-confirmed direct canonical_name -> iNat taxon_id overrides (debug nightly-resolution-gate). For names the iNat /v1/taxa API cannot resolve (gender variants, subspecies-only names, junior synonyms not in iNat at species rank). Read by resolve_taxon_ids.py and UPSERTed into the bridge BEFORE the API path, so these names never reach the resolution-gate as unresolved. Each row carries human-readable provenance in `note`."
    columns:
      - name: canonical_name
        description: "Lowercased occurrence canonical_name as it appears in the resolution pool (may be 2- or 3-token)."
        data_tests:
          - not_null
          - unique
      - name: taxon_id
        description: "iNat taxon_id the name resolves to (verified present in taxa.csv.gz)."
        data_tests:
          - not_null
      - name: note
        description: "Curator provenance: the iNat accepted name + reason for the override (gender variant / subspecies / synonym citation)."
