version: 2
updates:
  # GitHub Actions — weekly, minor+patch grouped
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions — install-lychee composite action. The github-actions entry
  # at "/" only scans .github/workflows/*, NOT composite actions under
  # .github/actions/ (confirmed Phase 145 WR-02: its actions/cache lagged a patch
  # behind deploy.yml's). A directory entry pointing at the composite action's
  # folder is required to keep it updated.
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/install-lychee"
    schedule:
      interval: "weekly"
    groups:
      install-lychee-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # npm — root package.json / package-lock.json, weekly, minor+patch grouped
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # @types/node tracks the Node major (.nvmrc → 24); don't let it jump ahead
      # of the runtime (types for Node 25 APIs would typecheck but fail at run).
      # Bump this major by hand when the Node version moves.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # npm — infra/ AWS CDK project (package.json / package-lock.json), weekly, minor+patch grouped
  - package-ecosystem: "npm"
    directory: "/infra"
    schedule:
      interval: "weekly"
    groups:
      infra-npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # @types/node tracks the Node major (.nvmrc → 24); don't let it jump ahead
      # of the runtime. Bump this major by hand when the Node version moves.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # uv — data/ pyproject.toml / uv.lock, weekly, minor+patch grouped
  - package-ecosystem: "uv"
    directory: "/data"
    schedule:
      interval: "weekly"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
