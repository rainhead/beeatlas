version: 2
updates:
  # GitHub Actions — weekly, minor+patch grouped
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # npm — root package.json / package-lock.json, weekly, minor+patch grouped
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # npm — infra/ AWS CDK project (package.json / package-lock.json), weekly, minor+patch grouped
  - package-ecosystem: "npm"
    directory: "/infra"
    schedule:
      interval: "weekly"
    groups:
      infra-npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # uv — data/ pyproject.toml / uv.lock, weekly, minor+patch grouped
  - package-ecosystem: "uv"
    directory: "/data"
    schedule:
      interval: "weekly"
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
