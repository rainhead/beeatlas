name: Build and Deploy

on:
  push:
    branches: ['**']
  repository_dispatch:
    types: [nightly-data-updated]
  workflow_dispatch:   # optional: manual rebuild via GitHub UI

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC, needed for AWS S3 read in the data-fetch step
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOYER_ROLE_ARN }}
          aws-region: us-west-2

      - name: Fetch build-time data from S3
        # Eleventy `_data/species.js` reads species.json + seasonality.json +
        # higher_taxa.json synchronously at build time. Other artifacts
        # (occurrences.parquet etc.) are fetched by the frontend at runtime via
        # manifest.json; only these three must be present in the working tree for
        # the build to succeed. (higher_taxa.json supersedes the retired
        # higher_rank_taxon_ids.json — D-03, Phase 132.)
        # Artifacts are content-hashed on S3; manifest.json resolves current names.
        # manifest.json is also written to public/data/ so validate-db can read it.
        run: |
          mkdir -p public/data
          aws s3 cp s3://${{ vars.S3_BUCKET_NAME }}/data/manifest.json /tmp/manifest.json
          cp /tmp/manifest.json public/data/manifest.json
          SPECIES_FILE=$(jq -r .species /tmp/manifest.json)
          SEASONALITY_FILE=$(jq -r .seasonality /tmp/manifest.json)
          HIGHER_TAXA_FILE=$(jq -r .higher_taxa /tmp/manifest.json)
          aws s3 cp s3://${{ vars.S3_BUCKET_NAME }}/data/$SPECIES_FILE public/data/species.json
          aws s3 cp s3://${{ vars.S3_BUCKET_NAME }}/data/$SEASONALITY_FILE public/data/seasonality.json
          aws s3 cp s3://${{ vars.S3_BUCKET_NAME }}/data/$HIGHER_TAXA_FILE public/data/higher_taxa.json
          COLLECTORS_FILE=$(jq -r .collectors /tmp/manifest.json)
          COLLECTOR_EVENT_PAGES_FILE=$(jq -r .collector_event_pages /tmp/manifest.json)
          aws s3 cp s3://${{ vars.S3_BUCKET_NAME }}/data/$COLLECTORS_FILE public/data/collectors.json
          aws s3 cp s3://${{ vars.S3_BUCKET_NAME }}/data/$COLLECTOR_EVENT_PAGES_FILE public/data/collector_event_pages.json

      - name: Run tests
        run: npm test

      - uses: ./.github/actions/install-lychee
        with:
          version: '0.23.0'

      - name: Cache lychee URL results
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.run_id }}
          restore-keys: lychee-cache-

      - name: Build site
        run: npm run build
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}

      - name: Check links (non-blocking)
        run: npm run build:validate-links
        continue-on-error: true

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site
          path: _site/
          retention-days: 1

  deploy:
    name: Deploy to S3 + CloudFront
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC JWT request — must be on THIS job
      contents: read
    environment: production
    env:
      S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: site
          path: _site/

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOYER_ROLE_ARN }}
          aws-region: us-west-2

      - name: Sync hashed assets (retain old versions for cached index.html)
        run: |
          aws s3 sync _site/assets/ s3://${{ vars.S3_BUCKET_NAME }}/assets/ \
            --cache-control "max-age=31536000, immutable"

      - name: Sync everything else
        run: |
          aws s3 sync _site/ s3://${{ vars.S3_BUCKET_NAME }} \
            --delete \
            --exclude "assets/*" \
            --exclude "cache/*" --exclude "data/*" --exclude "db/*" \
            --cache-control "max-age=0"

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CF_DISTRIBUTION_ID }} \
            --paths "/*" \
            --query 'Invalidation.Id' --output text)
          echo "invalidation_id=$INVALIDATION_ID" >> $GITHUB_OUTPUT
        id: invalidate

      - name: Wait for CloudFront invalidation
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ vars.CF_DISTRIBUTION_ID }} \
            --id ${{ steps.invalidate.outputs.invalidation_id }}

  lighthouse:
    name: Lighthouse audit
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          urls: https://beeatlas.net/
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
