name: Fetch Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly: Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      force_links_refetch:
        description: 'Clear HTML cache and re-fetch all Ecdysis links (~3h)'
        type: boolean
        default: false

jobs:
  fetch:
    name: Fetch and cache all data
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOYER_ROLE_ARN }}
          aws-region: us-west-2

      - name: Download and process Ecdysis data
        run: |
          cd data
          uv run python ecdysis/download.py --datasetid 44
          ZIPFILE=$(ls -t ecdysis_*.zip | head -1)
          uv run python ecdysis/occurrences.py "$ZIPFILE"

      - name: Fetch iNaturalist observations (full)
        # Always full fetch for anti-entropy: no last_fetch.txt means download.py
        # takes the full-fetch path and replaces rather than merges.
        # TODO: add deletion detection — observations removed from iNat currently
        # persist in samples.parquet until a fresh full fetch overwrites them.
        run: npm run fetch-inat

      - name: Restore links cache from S3
        run: npm run cache-restore-links

      - name: Clear HTML cache for full re-fetch
        if: ${{ inputs.force_links_refetch }}
        run: rm -rf data/raw/ecdysis_cache/

      - name: Fetch Ecdysis specimen links (incremental)
        run: npm run fetch-links

      - name: Refresh AWS credentials before upload
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOYER_ROLE_ARN }}
          aws-region: us-west-2

      - name: Upload all caches to S3
        run: npm run cache-upload && npm run cache-upload-links
